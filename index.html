<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Departures Board</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --flap-bg: #262626;
            --text-color: #e0e0e0;
            --flap-width: 32px;
            --flap-height: 50px;
            --font-size: 28px;
            --panel-bg: #111;
            --orange-status: #ff9900;
            --green-status: #22ff22;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            :root {
                --flap-width: 16px;
                --flap-height: 28px;
                --font-size: 14px;
            }
            body { padding: 10px; }
            h1 { font-size: 1.2rem; letter-spacing: 4px; }
            
            .board-container {
                border-width: 4px;
                padding: 10px;
            }
            
            .board { 
                min-width: 800px; /* Keeps the flaps aligned in a row */
            }
            
            .controls { 
                flex-direction: column; 
                width: 100%; 
                align-items: stretch; 
                box-sizing: border-box;
                display: none; /* Auto-running now, hiding controls */
            }
        }

        body {
            background-color: var(--bg-color);
            color: #ffcc00; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 { letter-spacing: 8px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255,204,0,0.3); text-align: center; }

        .system-clock-container {
            display: flex;
            gap: 3px;
            align-items: center;
            background: #1a1a1a;
            padding: 15px 25px;
            border: 4px solid #333;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 15px #000;
        }

        .controls { 
            margin-bottom: 30px; 
            background: #222; 
            padding: 15px; 
            border-radius: 8px;
            display: flex; 
            flex-wrap: wrap;
            gap: 10px; 
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 100%;
            visibility: hidden; /* Removing user interaction as requested */
            height: 0;
            padding: 0;
            margin: 0;
        }

        /* The Frame of the Board */
        .board-container {
            max-width: 100%;
            background: var(--panel-bg);
            padding: 30px;
            border: 8px solid #333;
            border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            overflow-x: auto; /* Handles the horizontal scroll */
            box-sizing: border-box;
        }

        .board {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: max-content; /* Ensures it expands to show all flaps */
        }

        .header-row {
            display: flex;
            gap: 20px;
            color: #555;
            font-size: 12px;
            font-weight: bold;
            padding-bottom: 5px;
            border-bottom: 1px solid #222;
        }

        .row { display: flex; gap: 20px; align-items: center; }
        .group { display: flex; gap: 3px; align-items: center; }

        .separator {
            font-size: var(--font-size);
            color: var(--text-color);
            font-weight: bold;
            padding: 0 2px;
        }

        .group-remarks .flap { color: var(--orange-status); }
        .group-boarding .flap { color: var(--green-status); }

        .flap-container {
            perspective: 300px;
            width: var(--flap-width);
            height: var(--flap-height);
        }

        .flap {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--flap-bg);
            border-radius: 3px;
            line-height: var(--flap-height);
            text-align: center;
            font-size: var(--font-size);
            font-weight: bold;
            color: var(--text-color);
            transform-style: preserve-3d;
        }

        .flap::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(0,0,0,0.8);
            z-index: 5;
            transform: translateZ(1px);
        }

        .flap-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            transform: rotateX(180deg);
            border-radius: 3px;
            z-index: -1;
            background-color: var(--flap-bg);
        }

        .flipping { animation: flip-3d 0.08s ease-in; }

        @keyframes flip-3d {
            0% { transform: rotateX(0deg); }
            50% { transform: rotateX(-90deg); }
            100% { transform: rotateX(-180deg); }
        }
    </style>
</head>
<body>

    <h1>Departures</h1>
    <div class="system-clock-container" id="clockBoard"></div>

    <div class="controls">
        <input type="text" id="timeIn">
        <input type="text" id="toIn">
        <input type="text" id="airIn">
        <input type="text" id="checkIn">
    </div>

    <div class="board-container">
        <div class="board" id="mainBoard">
            <div class="header-row">
                <div style="width: 210px;">FLIGHT</div>
                <div style="width: 137px;">TIME</div>
                <div style="width: 485px;">TO</div>
                <div style="width: 485px;">AIRPORT</div>
                <div style="width: 137px;">CHK</div>
                <div style="width: 345px;">REMARKS</div>
                <div style="width: 105px;">BOARDING</div>
            </div>
        </div>
    </div>

    <audio id="ambientAudio" loop>
        <source src="https://www.epidemicsound.com/sound-effects/tracks/50f6780d-6e1a-40da-8fa9-54087a6bf1c9/" type="audio/,peg">
    </audio>

    <script>
        const CHARS = " ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.:-!/@$%&*()?".split("");
        const CLOCK_CHARS = "0123456789 ".split("");
        const PASTELS = ["#FFB7B2", "#FFDAC1", "#E2F0CB", "#B5EAD7", "#C7CEEA", "#F3D1F4"];

        const AIRPORTS = [
            { city: "LONDON", code: "LHR" }, { city: "NEW YORK", code: "JFK" },
            { city: "TOKYO", code: "NRT" }, { city: "PARIS", code: "CDG" },
            { city: "DUBAI", code: "DXB" }, { city: "SINGAPORE", code: "SIN" },
            { city: "HONG KONG", code: "HKG" }, { city: "AMSTERDAM", code: "AMS" },
            { city: "LOS ANGELES", code: "LAX" }, { city: "FRANKFURT", code: "FRA" },
            { city: "SYDNEY", code: "SYD" }, { city: "AUCKLAND", code: "AKL" },
            { city: "MADRID", code: "MAD" }, { city: "ROME", code: "FCO" },
            { city: "BANGKOK", code: "BKK" }, { city: "SEOUL", code: "ICN" },
            { city: "MUMBAI", code: "BOM" }, { city: "DELHI", code: "DEL" },
            { city: "ISTANBUL", code: "IST" }, { city: "ZURICH", code: "ZRH" },
            { city: "DOHA", code: "DOH" }, { city: "TORONTO", code: "YYZ" },
            { city: "CHICAGO", code: "ORD" }, { city: "SAO PAULO", code: "GRU" }
        ];

        const ROWS_COUNT = 8;
        const COL_CONFIG = [
            { id: 'flight', size: 6 },
            { id: 'time', size: 4, separatorAt: 2 },
            { id: 'to', size: 14 },
            { id: 'airport', size: 14 },
            { id: 'checkin', size: 4, separatorAt: 2 },
            { id: 'remarks', size: 10 },
            { id: 'boarding', size: 3 }
        ];

        let boardState = [];
        let clockState = [" ", " ", " ", " ", " ", " "];

        // Audio initialization on first click
        function initAudio() {
            const audio = document.getElementById('ambientAudio');
            audio.play().catch(e => console.log("Audio play blocked by browser."));
            // Remove listener after first interaction
            document.removeEventListener('click', initAudio);
            document.removeEventListener('touchstart', initAudio);
        }

        document.addEventListener('click', initAudio);
        document.addEventListener('touchstart', initAudio);

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const timeString = h + m + s;
            const targetChars = timeString.split("");

            targetChars.forEach((char, i) => {
                const el = document.getElementById(`clock-flap-${i}`);
                if (el && clockState[i] !== char) {
                    const startChar = clockState[i];
                    animateClockFlap(el, startChar, char, i);
                }
            });
        }

        function initClock() {
            const clockBoard = document.getElementById('clockBoard');
            for (let i = 0; i < 6; i++) {
                if (i > 0 && i % 2 === 0) {
                    const sep = document.createElement('div');
                    sep.className = 'separator';
                    sep.innerText = ':';
                    clockBoard.appendChild(sep);
                }
                const container = document.createElement('div');
                container.className = 'flap-container';
                const flap = document.createElement('div');
                flap.className = 'flap';
                flap.id = `clock-flap-${i}`;
                flap.innerText = " ";
                
                const back = document.createElement('div');
                back.className = 'flap-back';
                
                flap.appendChild(back);
                container.appendChild(flap);
                clockBoard.appendChild(container);
            }
            setInterval(updateClock, 1000);
            updateClock();
        }

        async function animateClockFlap(element, startChar, endChar, idx) {
            let currentIndex = CLOCK_CHARS.indexOf(startChar);
            let targetIndex = CLOCK_CHARS.indexOf(endChar);
            if (targetIndex === -1) targetIndex = 0;

            while (currentIndex !== targetIndex) {
                currentIndex = (currentIndex + 1) % CLOCK_CHARS.length;
                element.classList.remove('flipping');
                void element.offsetWidth; 
                element.classList.add('flipping');

                await new Promise(r => setTimeout(r, 20));
                element.childNodes[0].nodeValue = CLOCK_CHARS[currentIndex];
                await new Promise(r => setTimeout(r, 20)); 
            }
            clockState[idx] = endChar;
        }

        function getFlightStatus(flightTimeStr) {
            if (!flightTimeStr || flightTimeStr.length !== 4) return { remark: "CONFIRMED", boarding: "   " };
            
            const now = new Date();
            const currentTotalMinutes = now.getHours() * 60 + now.getMinutes();
            
            const fH = parseInt(flightTimeStr.substring(0, 2));
            const fM = parseInt(flightTimeStr.substring(2, 4));
            const flightTotalMinutes = fH * 60 + fM;

            const diff = flightTotalMinutes - currentTotalMinutes;

            if (diff < -15) {
                return { remark: "DEPARTED", boarding: "   " };
            } else if (diff <= 0 && diff >= -15) {
                return { remark: "BOARDING", boarding: "NOW" };
            } else if (diff > 0 && diff <= 30) {
                return { remark: "BOARDING", boarding: "   " };
            } else if (diff > 180) {
                return { remark: "DELAYED", boarding: "   " };
            } else {
                return { remark: "CONFIRMED", boarding: "   " };
            }
        }

        function calculateCheckIn(flightTimeStr) {
            if (flightTimeStr.length !== 4) return "0000";
            let h = parseInt(flightTimeStr.substring(0, 2));
            let m = parseInt(flightTimeStr.substring(2, 4));
            
            let totalMinutes = h * 60 + m - 45;
            if (totalMinutes < 0) totalMinutes += 1440; 
            
            let chkH = Math.floor(totalMinutes / 60);
            let chkM = totalMinutes % 60;
            return String(chkH).padStart(2, '0') + String(chkM).padStart(2, '0');
        }

        function initBoard() {
            const boardElem = document.getElementById('mainBoard');
            for (let r = 0; r < ROWS_COUNT; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                let rowObj = {};

                COL_CONFIG.forEach(col => {
                    const group = document.createElement('div');
                    group.className = `group group-${col.id}`;
                    for (let i = 0; i < col.size; i++) {
                        if (col.separatorAt === i) {
                            const sep = document.createElement('div');
                            sep.className = 'separator';
                            sep.innerText = ':';
                            group.appendChild(sep);
                        }

                        const container = document.createElement('div');
                        container.className = 'flap-container';
                        const flap = document.createElement('div');
                        flap.className = 'flap';
                        flap.id = `r${r}-${col.id}-${i}`;
                        flap.innerText = " ";
                        
                        const back = document.createElement('div');
                        back.className = 'flap-back';
                        
                        flap.appendChild(back);
                        container.appendChild(flap);
                        group.appendChild(container);
                    }
                    rowDiv.appendChild(group);
                    rowObj[col.id] = Array(col.size).fill(" ");
                });

                boardElem.appendChild(rowDiv);
                boardState.push(rowObj);
            }
            setInterval(updateTopRow, 10000);
            updateTopRow();
        }

        async function updateTopRow() {
            for (let r = ROWS_COUNT - 1; r > 0; r--) {
                const prevData = {...boardState[r-1]};
                applyRowData(r, prevData);
            }

            const depIndex = Math.floor(Math.random() * AIRPORTS.length);
            const depAir = AIRPORTS[depIndex];
            
            let destIndex;
            do {
                destIndex = Math.floor(Math.random() * AIRPORTS.length);
            } while (destIndex === depIndex);
            const destAir = AIRPORTS[destIndex];
            
            const rh = String(Math.floor(Math.random() * 24)).padStart(2, '0');
            const rm = String(Math.floor(Math.random() * 60)).padStart(2, '0');
            const timeValue = rh + rm;

            const departureCity = depAir.city.toUpperCase();
            const destinationCity = destAir.city.toUpperCase();
            const flightCode = depAir.code.toUpperCase() + Math.floor(100 + Math.random() * 899);
            
            const chkValue = calculateCheckIn(timeValue);
            const status = getFlightStatus(timeValue);

            const newData = {
                flight: flightCode,
                time: timeValue,
                to: destinationCity,
                airport: departureCity,
                checkin: chkValue,
                remarks: status.remark,
                boarding: status.boarding
            };
            applyRowData(0, newData);
        }

        function applyRowData(rowIndex, data) {
            COL_CONFIG.forEach(col => {
                let text = (data[col.id] || "");
                if (Array.isArray(text)) {
                    text = text.join("");
                }
                const targetText = text.padEnd(col.size, " ").substring(0, col.size);
                const targetChars = targetText.split("");
                
                targetChars.forEach((char, charIdx) => {
                    const el = document.getElementById(`r${rowIndex}-${col.id}-${charIdx}`);
                    if (el) {
                        const startChar = boardState[rowIndex][col.id][charIdx];
                        boardState[rowIndex][col.id][charIdx] = char;
                        animateFlap(el, startChar, char);
                    }
                });
            });
        }

        async function animateFlap(element, startChar, endChar) {
            if (startChar === endChar) return;

            let currentIndex = CHARS.indexOf(startChar);
            let targetIndex = CHARS.indexOf(endChar);
            if (targetIndex === -1) targetIndex = 0;

            while (currentIndex !== targetIndex) {
                currentIndex = (currentIndex + 1) % CHARS.length;
                element.classList.remove('flipping');
                void element.offsetWidth; 
                element.classList.add('flipping');

                await new Promise(r => setTimeout(r, 30));
                element.childNodes[0].nodeValue = CHARS[currentIndex];
                await new Promise(r => setTimeout(r, 30)); 
            }
        }

        initClock();
        initBoard();
    </script>
</body>
</html>
